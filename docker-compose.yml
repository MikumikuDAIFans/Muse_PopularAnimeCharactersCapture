services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=muse
      - POSTGRES_PASSWORD=muse
      - POSTGRES_DB=muse_dataload
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./output:/app/output
    environment:
      - DATABASE_URL=postgresql+asyncpg://muse:muse@postgres:5432/muse_dataload
      - OUTPUT_ROOT=/app/output
      - DEBUG=false
    depends_on:
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
